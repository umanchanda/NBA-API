<!DOCTYPE html>
<html>

<head>
    <title>NBA Player Search</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 {
            color: #c9aa71;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .subtitle { color: #8a8fa8; }
        .back-link {
            color: #c9aa71;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #e0c48a; }
        .search-card {
            background-color: #16213e;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .form-label {
            color: #c9aa71;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control, .form-select {
            background-color: #0f3460;
            color: #e0e0e0;
            border: 1px solid #2a4a7f;
            border-radius: 8px;
        }
        .form-control::placeholder { color: #5a6a8a; }
        .form-control:focus, .form-select:focus {
            background-color: #0f3460;
            color: #e0e0e0;
            border-color: #c9aa71;
            box-shadow: 0 0 0 0.2rem rgba(201,170,113,0.25);
        }
        .btn-search {
            background-color: #c9aa71;
            color: #1a1a2e;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        .btn-search:hover { background-color: #e0c48a; color: #1a1a2e; }
        .result-card {
            background-color: #16213e;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .result-card .card-header {
            background-color: #0f3460;
            border-bottom: 1px solid #2a4a7f;
        }
        .player-name {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .player-meta {
            color: #8a8fa8;
            font-size: 0.85rem;
        }
        .season-badge {
            background-color: #c9aa71;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .stat-box {
            background-color: #0f3460;
            border-radius: 10px;
            padding: 10px 8px;
            text-align: center;
        }
        .stat-label {
            color: #8a8fa8;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 2px;
        }
        #loading { color: #8a8fa8; text-align: center; margin-top: 40px; display: none; }
        #error-msg { color: #e07070; text-align: center; margin-top: 20px; display: none; }
        #no-results { color: #8a8fa8; text-align: center; margin-top: 40px; display: none; }
    </style>
</head>

<body>
    <div class="container" style="max-width: 900px;">
        <div class="mb-2">
            <a href="/" class="back-link">&#8592; Back</a>
        </div>
        <div class="text-center mb-4">
            <div style="font-size:2rem;">🔍</div>
            <h1>Player Search</h1>
            <p class="subtitle">Search season totals by player name and year</p>
        </div>

        <div class="search-card p-4 mb-4">
            <form id="search-form">
                <div class="row g-3 align-items-end">
                    <div class="col-12 col-md-6">
                        <label for="player-name" class="form-label">Player Name</label>
                        <input id="player-name" type="text" class="form-control"
                               placeholder="e.g. LeBron James" autocomplete="off" />
                    </div>
                    <div class="col-12 col-md-4">
                        <label for="season" class="form-label">Season (optional)</label>
                        <select id="season" class="form-select"></select>
                    </div>
                    <div class="col-12 col-md-3">
                        <label for="season-type" class="form-label">Season Type</label>
                        <select id="season-type" class="form-select">
                            <option value="">All</option>
                            <option value="regular">Regular Season</option>
                            <option value="playoffs">Playoffs</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-2">
                        <button type="submit" class="btn btn-search w-100 py-2">Search</button>
                    </div>
                </div>
            </form>
        </div>

        <div id="loading">Searching...</div>
        <div id="error-msg"></div>
        <div id="no-results">No players found.</div>
        <div id="results" class="d-flex flex-column gap-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            const seasonSelect = document.getElementById("season");
            const allOpt = document.createElement("option");
            allOpt.value = "";
            allOpt.textContent = "All seasons";
            seasonSelect.appendChild(allOpt);

            const currentYear = new Date().getFullYear() + 1;
            for (let y = currentYear; y >= 1990; y--) {
                const opt = document.createElement("option");
                opt.value = y;
                opt.textContent = (y - 1) + "-" + String(y).slice(2).padStart(2, "0");
                seasonSelect.appendChild(opt);
            }
        })();

        document.getElementById('search-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name       = document.getElementById('player-name').value.trim();
            const season     = document.getElementById('season').value;
            const seasonType = document.getElementById('season-type').value;
            if (!name) return;

            document.getElementById('results').innerHTML = '';
            document.getElementById('no-results').style.display = 'none';
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            let url = '/api/player?name=' + encodeURIComponent(name);
            if (season)     url += '&season='      + season;
            if (seasonType) url += '&season_type=' + seasonType;

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    if (!data || data.length === 0) {
                        document.getElementById('no-results').style.display = 'block';
                        return;
                    }
                    document.getElementById('results').innerHTML = data.map(renderResult).join('');
                })
                .catch(err => {
                    document.getElementById('loading').style.display = 'none';
                    const el = document.getElementById('error-msg');
                    el.style.display = 'block';
                    el.textContent = 'Search failed: ' + err.message;
                });
        });

        const seasonLabel = s => {
            const y = parseInt(s);
            return (y - 1) + '-' + String(y).slice(2);
        };

        function renderResult(p) {
            const stats = [
                { label: 'G',    value: p.g },
                { label: 'GS',   value: p.gs },
                { label: 'MP',   value: p.mp },
                { label: 'PTS',  value: p.pts },
                { label: 'REB',  value: p.trb },
                { label: 'AST',  value: p.ast },
                { label: 'STL',  value: p.stl },
                { label: 'BLK',  value: p.blk },
                { label: 'FG%',  value: p.fg_pct },
                { label: '3P%',  value: p.fg3_pct },
                { label: 'FT%',  value: p.ft_pct },
                { label: 'FG',   value: p.fg },
                { label: 'FGA',  value: p.fga },
                { label: '3P',   value: p.fg3 },
                { label: '3PA',  value: p.fg3a },
                { label: 'FT',   value: p.ft },
                { label: 'FTA',  value: p.fta },
                { label: 'ORB',  value: p.orb },
                { label: 'DRB',  value: p.drb },
                { label: 'TOV',  value: p.tov },
                { label: 'PF',   value: p.pf },
            ];

            return `
                <div class="result-card">
                    <div class="card-header d-flex justify-content-between align-items-center px-4 py-3">
                        <div>
                            <div class="player-name">${p.name}</div>
                            <div class="player-meta">${p.team} &bull; ${p.pos} &bull; Age ${p.age}</div>
                        </div>
                        <div class="d-flex flex-column align-items-end gap-1">
                            <span class="season-badge">${seasonLabel(p.season)}</span>
                            <span style="color:#8a8fa8;font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;">${p.season_type === 'playoffs' ? 'Playoffs' : 'Regular Season'}</span>
                        </div>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <div class="stats-grid">
                            ${stats.map(s => `
                                <div class="stat-box">
                                    <div class="stat-label">${s.label}</div>
                                    <div class="stat-value">${s.value || '—'}</div>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>`;
        }
    </script>
</body>

</html>
