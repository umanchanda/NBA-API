<!DOCTYPE html>
<html>

<head>
    <title>NBA Team Stats</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 {
            color: #c9aa71;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #8a8fa8;
        }
        .back-link {
            color: #c9aa71;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #e0c48a; }
        .team-card {
            background-color: #16213e;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .team-card .card-header {
            background-color: #0f3460;
            color: #c9aa71;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a4a7f;
        }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }
        .stats-table tr {
            border-bottom: 1px solid #1e2d50;
        }
        .stats-table tr:last-child { border-bottom: none; }
        .stats-table td {
            padding: 10px 16px;
            color: #e0e0e0;
        }
        .stats-table td:first-child {
            color: #8a8fa8;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 55%;
        }
        .stats-table td:last-child {
            color: #ffffff;
            font-weight: 600;
            text-align: right;
        }
        #loading { color: #8a8fa8; text-align: center; margin-top: 60px; }
        #error-msg { color: #e07070; text-align: center; margin-top: 60px; display: none; }
    </style>
</head>

<body>
    <div class="container" style="max-width: 900px;">
        <div class="mb-2">
            <a id="back-link" href="#" class="back-link">&#8592; Back to Box Scores</a>
        </div>
        <div class="text-center mb-5">
            <div style="font-size:2rem;">📊</div>
            <h1>Team Stats</h1>
            <p class="subtitle" id="matchup-label"></p>
        </div>

        <div id="loading">Loading stats...</div>
        <div id="error-msg"></div>
        <div id="teams" class="row g-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const parts = window.location.pathname.split('/');
        const year = parts[2], month = parts[3], day = parts[4];
        const away = parts[5], home = parts[6];

        document.getElementById('back-link').href = '/scores/' + year + '/' + month + '/' + day;
        document.getElementById('matchup-label').textContent = away + ' @ ' + home;

        fetch('/boxscore/' + year + '/' + month + '/' + day + '/' + away + '/' + home)
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('teams').innerHTML = data.map(renderTeamCard).join('');
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                const el = document.getElementById('error-msg');
                el.style.display = 'block';
                el.textContent = 'Failed to load stats: ' + err.message;
            });

        const statLabels = [
            ['Minutes Played',        'minutes_played'],
            ['Field Goals',           'field_goals'],
            ['FG Attempted',          'field_goals_attempted'],
            ['FG %',                  'field_goal_percentage'],
            ['3-Pointers',            'three_point'],
            ['3P Attempted',          'three_point_attempted'],
            ['3P %',                  'three_point_percentage'],
            ['Free Throws',           'free_throws'],
            ['FT Attempted',          'free_throws_attempted'],
            ['FT %',                  'free_throw_percentage'],
            ['Off. Rebounds',         'offensive_rebounds'],
            ['Def. Rebounds',         'defensive_rebounds'],
            ['Total Rebounds',        'total_rebounds'],
            ['Assists',               'assists'],
            ['Steals',                'steals'],
            ['Blocks',                'blocks'],
            ['Turnovers',             'turnovers'],
            ['Personal Fouls',        'personal_fouls'],
            ['Points',                'points'],
        ];

        function renderTeamCard(team) {
            const rows = statLabels.map(([label, key]) =>
                `<tr><td>${label}</td><td>${team[key] || '—'}</td></tr>`
            ).join('');
            return `
                <div class="col-12 col-md-6">
                    <div class="team-card card h-100">
                        <div class="card-header">${team.team || 'Team'}</div>
                        <div class="card-body p-0">
                            <table class="stats-table">${rows}</table>
                        </div>
                    </div>
                </div>`;
        }
    </script>
</body>

</html>
