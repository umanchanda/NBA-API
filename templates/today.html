<!DOCTYPE html>
<html>

<head>
    <title>NBA Today</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 {
            color: #c9aa71;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #8a8fa8;
        }
        .back-link {
            color: #c9aa71;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #e0c48a; }
        .game-card {
            background-color: #16213e;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .game-card .card-header {
            background-color: #0f3460;
            border-bottom: 1px solid #2a4a7f;
            color: #8a8fa8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .team-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1e2d50;
        }
        .team-row:last-child { border-bottom: none; }
        .team-name {
            color: #e0e0e0;
            font-size: 1.05rem;
            font-weight: 500;
        }
        .team-name.winner {
            color: #ffffff;
            font-weight: 700;
        }
        .team-score {
            color: #e0e0e0;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .team-score.winner { color: #c9aa71; }
        .winner-badge {
            color: #c9aa71;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 8px;
        }
        .live-badge {
            background-color: #e05050;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .series-badge {
            color: #8a8fa8;
            font-size: 0.75rem;
            margin-top: 6px;
        }
        .quarter-table {
            width: 100%;
            font-size: 0.8rem;
            color: #8a8fa8;
            border-collapse: collapse;
            margin-top: 12px;
        }
        .quarter-table th {
            color: #5a6a8a;
            font-weight: 600;
            text-align: center;
            padding: 4px 8px;
            text-transform: uppercase;
            font-size: 0.7rem;
        }
        .quarter-table td {
            text-align: center;
            padding: 4px 8px;
            color: #a0aec0;
        }
        .quarter-table .team-label { text-align: left; color: #8a8fa8; }
        .pregame-time {
            color: #c9aa71;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            padding: 16px 0 8px;
        }
        #loading { color: #8a8fa8; text-align: center; margin-top: 60px; }
        #error-msg { color: #e07070; text-align: center; margin-top: 60px; }
        .no-games { color: #8a8fa8; text-align: center; margin-top: 60px; font-size: 1.1rem; }
        .refresh-note { color: #5a6a8a; font-size: 0.78rem; text-align: center; margin-top: 16px; }
    </style>
</head>

<body>
    <div class="container" style="max-width: 860px;">
        <div class="mb-2">
            <a href="/" class="back-link">&#8592; Back</a>
        </div>
        <div class="text-center mb-5">
            <div style="font-size:2rem;">🏀</div>
            <h1>Today's Games</h1>
            <p class="subtitle" id="date-label"></p>
        </div>

        <div id="loading">Loading scores...</div>
        <div id="error-msg" style="display:none;"></div>
        <div id="games" class="row g-4"></div>
        <p class="refresh-note" id="refresh-note" style="display:none;">Live games auto-refresh every 30 seconds.</p>
    </div>

    <script>
        const monthNames = ['','January','February','March','April','May','June',
                            'July','August','September','October','November','December'];
        const now = new Date();
        document.getElementById('date-label').textContent =
            monthNames[now.getMonth()+1] + ' ' + now.getDate() + ', ' + now.getFullYear();

        let refreshTimer = null;

        function load() {
            fetch('/api/scoreboard')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    const games = data.games || [];
                    if (games.length === 0) {
                        document.getElementById('games').innerHTML =
                            '<p class="no-games">No games scheduled for today.</p>';
                        return;
                    }
                    document.getElementById('games').innerHTML = games.map(renderCard).join('');

                    const hasLive = games.some(g => g.status === 'in');
                    document.getElementById('refresh-note').style.display = hasLive ? 'block' : 'none';
                    if (hasLive) {
                        clearTimeout(refreshTimer);
                        refreshTimer = setTimeout(load, 30000);
                    }
                })
                .catch(err => {
                    document.getElementById('loading').style.display = 'none';
                    const el = document.getElementById('error-msg');
                    el.style.display = 'block';
                    el.textContent = 'Failed to load scores: ' + err.message;
                });
        }

        function renderCard(game) {
            const isPre  = game.status === 'pre';
            const isLive = game.status === 'in';
            const isPost = game.status === 'post';

            const awayWinner = !game.home_winner && isPost;
            const homeWinner = game.home_winner && isPost;

            let statusHtml = '';
            if (isLive) {
                const period = game.period <= 4 ? 'Q' + game.period : 'OT' + (game.period - 4);
                statusHtml = `<span class="live-badge">Live</span> <span style="color:#e0e0e0;font-size:0.8rem;">${game.clock} &bull; ${period}</span>`;
            } else if (isPost) {
                statusHtml = `<span style="color:#8a8fa8;">${game.status_detail}</span>`;
            } else {
                statusHtml = `<span style="color:#8a8fa8;">${game.status_detail || 'Scheduled'}</span>`;
            }

            const seriesHtml = game.series_summary
                ? `<p class="series-badge">${game.series_summary}</p>` : '';

            let scoresHtml = '';
            if (isPre) {
                scoresHtml = `<div class="pregame-time">${game.status_detail}</div>`;
            } else {
                scoresHtml = `
                    <div class="team-row">
                        <span class="team-name ${awayWinner ? 'winner' : ''}">
                            ${game.away_team}
                            ${awayWinner ? '<span class="winner-badge">W</span>' : ''}
                        </span>
                        <span class="team-score ${awayWinner ? 'winner' : ''}">${game.away_score}</span>
                    </div>
                    <div class="team-row">
                        <span class="team-name ${homeWinner ? 'winner' : ''}">
                            ${game.home_team}
                            ${homeWinner ? '<span class="winner-badge">W</span>' : ''}
                        </span>
                        <span class="team-score ${homeWinner ? 'winner' : ''}">${game.home_score}</span>
                    </div>
                    ${renderQuarterTable(game)}`;
            }

            return `
                <div class="col-12 col-md-6">
                    <div class="game-card card h-100">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span>Away vs Home</span>
                            <span>${statusHtml}</span>
                        </div>
                        <div class="card-body">
                            ${scoresHtml}
                            ${seriesHtml}
                        </div>
                    </div>
                </div>`;
        }

        function renderQuarterTable(game) {
            const awayScores = game.away_linescores || [];
            const homeScores = game.home_linescores || [];
            if (awayScores.length === 0) return '';

            const headers = awayScores
                .map((_, i) => '<th>' + (i < 4 ? 'Q' + (i+1) : 'OT' + (i-3)) + '</th>')
                .join('');
            const awayQs = awayScores.map(s => '<td>' + s + '</td>').join('');
            const homeQs = homeScores.map(s => '<td>' + s + '</td>').join('');

            return `
                <table class="quarter-table">
                    <thead><tr><th></th>${headers}</tr></thead>
                    <tbody>
                        <tr><td class="team-label">${game.away_team}</td>${awayQs}</tr>
                        <tr><td class="team-label">${game.home_team}</td>${homeQs}</tr>
                    </tbody>
                </table>`;
        }

        load();
    </script>
</body>

</html>
