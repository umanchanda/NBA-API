<!DOCTYPE html>
<html>

<head>
    <title>NBA Player Stats</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 {
            color: #c9aa71;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .subtitle { color: #8a8fa8; }
        .back-link {
            color: #c9aa71;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #e0c48a; }
        .section-title {
            color: #c9aa71;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a4a7f;
        }
        .group-label {
            color: #8a8fa8;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 8px;
        }
        .player-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        .player-table thead tr {
            background-color: #0f3460;
        }
        .player-table thead th {
            color: #8a8fa8;
            font-weight: 600;
            padding: 8px 10px;
            text-align: center;
            white-space: nowrap;
        }
        .player-table thead th:first-child { text-align: left; }
        .player-table tbody tr {
            border-bottom: 1px solid #1e2d50;
        }
        .player-table tbody tr:hover {
            background-color: #1e2d50;
        }
        .player-table tbody td {
            color: #c0cce0;
            padding: 8px 10px;
            text-align: center;
            white-space: nowrap;
        }
        .player-table tbody td:first-child {
            text-align: left;
            color: #ffffff;
            font-weight: 500;
        }
        .team-block {
            background-color: #16213e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            overflow-x: auto;
        }
        #loading { color: #8a8fa8; text-align: center; margin-top: 60px; }
        #error-msg { color: #e07070; text-align: center; margin-top: 60px; display: none; }
    </style>
</head>

<body>
    <div class="container-fluid" style="max-width: 1200px;">
        <div class="mb-2">
            <a id="back-link" href="#" class="back-link">&#8592; Back to Box Scores</a>
        </div>
        <div class="text-center mb-5">
            <div style="font-size:2rem;">🏀</div>
            <h1>Player Stats</h1>
            <p class="subtitle" id="matchup-label"></p>
        </div>

        <div id="loading">Loading stats...</div>
        <div id="error-msg"></div>
        <div id="content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const parts = window.location.pathname.split('/');
        const year = parts[2], month = parts[3], day = parts[4];
        const away = parts[5], home = parts[6];

        document.getElementById('back-link').href = '/scores/' + year + '/' + month + '/' + day;
        document.getElementById('matchup-label').textContent = away + ' @ ' + home;

        fetch('/boxscore/' + year + '/' + month + '/' + day + '/' + away + '/' + home + '/player')
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                const teams = [away, home];
                document.getElementById('content').innerHTML =
                    data.map((teamData, i) => renderTeamBlock(teams[i], teamData)).join('');
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                const el = document.getElementById('error-msg');
                el.style.display = 'block';
                el.textContent = 'Failed to load stats: ' + err.message;
            });

        const cols = [
            { label: 'MP',   key: 'minutes_played' },
            { label: 'FG',   key: 'field_goals' },
            { label: 'FGA',  key: 'field_goals_attempted' },
            { label: 'FG%',  key: 'field_goal_percentage' },
            { label: '3P',   key: 'three_point' },
            { label: '3PA',  key: 'three_point_attempted' },
            { label: '3P%',  key: 'three_point_percentage' },
            { label: 'FT',   key: 'free_throws' },
            { label: 'FTA',  key: 'free_throws_attempted' },
            { label: 'FT%',  key: 'free_throw_percentage' },
            { label: 'ORB',  key: 'offensive_rebounds' },
            { label: 'DRB',  key: 'defensive_rebounds' },
            { label: 'REB',  key: 'total_rebounds' },
            { label: 'AST',  key: 'assists' },
            { label: 'STL',  key: 'steals' },
            { label: 'BLK',  key: 'blocks' },
            { label: 'TOV',  key: 'turnovers' },
            { label: 'PF',   key: 'personal_fouls' },
            { label: 'PTS',  key: 'points' },
            { label: '+/-',  key: 'plus_minus' },
        ];

        const header = '<thead><tr><th>Player</th>' +
            cols.map(c => '<th>' + c.label + '</th>').join('') +
            '</tr></thead>';

        function renderRows(players) {
            return (players || []).map(p =>
                '<tr><td>' + (p.name || '—') + '</td>' +
                cols.map(c => '<td>' + (p[c.key] || '—') + '</td>').join('') +
                '</tr>'
            ).join('');
        }

        function renderTeamBlock(teamName, teamData) {
            return `
                <div class="team-block">
                    <div class="section-title">${teamName}</div>
                    <div class="group-label">Starters</div>
                    <table class="player-table">
                        ${header}
                        <tbody>${renderRows(teamData.starters)}</tbody>
                    </table>
                    <div class="group-label">Reserves</div>
                    <table class="player-table">
                        ${header}
                        <tbody>${renderRows(teamData.reserves)}</tbody>
                    </table>
                </div>`;
        }
    </script>
</body>

</html>
