<!DOCTYPE html>
<html>

<head>
    <title>NBA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background-color: #16213e;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        h1 {
            color: #c9aa71;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #8a8fa8;
            font-size: 0.95rem;
        }
        .form-label {
            color: #c9aa71;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-select {
            background-color: #0f3460;
            color: #e0e0e0;
            border: 1px solid #2a4a7f;
            border-radius: 8px;
        }
        .form-select:focus {
            background-color: #0f3460;
            color: #e0e0e0;
            border-color: #c9aa71;
            box-shadow: 0 0 0 0.2rem rgba(201, 170, 113, 0.25);
        }
        .btn-submit {
            background-color: #c9aa71;
            color: #1a1a2e;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 10px 0;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #e0c48a;
            color: #1a1a2e;
        }
        .nba-logo {
            font-size: 2.5rem;
        }
    </style>
</head>

<body>
    <div class="card p-5" style="width: 100%; max-width: 480px;">
        <div class="text-center mb-4">
            <div class="nba-logo mb-2">🏀</div>
            <h1>NBA API</h1>
            <p class="subtitle">Look up box scores by date</p>
        </div>

        <form onsubmit="goToBoxscore(event)">
            <div class="mb-3">
                <label for="year" class="form-label">Year</label>
                <select id="year" class="form-select">
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                    <option value="2020">2020</option>
                    <option value="2019">2019</option>
                    <option value="2018">2018</option>
                    <option value="2017">2017</option>
                    <option value="2016">2016</option>
                    <option value="2015">2015</option>
                    <option value="2014">2014</option>
                    <option value="2013">2013</option>
                    <option value="2012">2012</option>
                    <option value="2011">2011</option>
                    <option value="2010">2010</option>
                    <option value="2009">2009</option>
                    <option value="2008">2008</option>
                    <option value="2007">2007</option>
                    <option value="2006">2006</option>
                    <option value="2005">2005</option>
                    <option value="2004">2004</option>
                    <option value="2003">2003</option>
                    <option value="2002">2002</option>
                    <option value="2001">2001</option>
                    <option value="2000">2000</option>
                    <option value="1999">1999</option>
                    <option value="1998">1998</option>
                    <option value="1997">1997</option>
                    <option value="1996">1996</option>
                    <option value="1995">1995</option>
                    <option value="1994">1994</option>
                    <option value="1993">1993</option>
                    <option value="1992">1992</option>
                    <option value="1991">1991</option>
                    <option value="1990">1990</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="month" class="form-label">Month</label>
                <select id="month" class="form-select">
                    <option value="01">January</option>
                    <option value="02">February</option>
                    <option value="03">March</option>
                    <option value="04">April</option>
                    <option value="05">May</option>
                    <option value="06">June</option>
                    <option value="07">July</option>
                    <option value="08">August</option>
                    <option value="09">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="day" class="form-label">Day</label>
                <select id="day" class="form-select">
                    <option value="01">1</option>
                    <option value="02">2</option>
                    <option value="03">3</option>
                    <option value="04">4</option>
                    <option value="05">5</option>
                    <option value="06">6</option>
                    <option value="07">7</option>
                    <option value="08">8</option>
                    <option value="09">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                    <option value="13">13</option>
                    <option value="14">14</option>
                    <option value="15">15</option>
                    <option value="16">16</option>
                    <option value="17">17</option>
                    <option value="18">18</option>
                    <option value="19">19</option>
                    <option value="20">20</option>
                    <option value="21">21</option>
                    <option value="22">22</option>
                    <option value="23">23</option>
                    <option value="24">24</option>
                    <option value="25">25</option>
                    <option value="26">26</option>
                    <option value="27">27</option>
                    <option value="28">28</option>
                    <option value="29">29</option>
                    <option value="30">30</option>
                    <option value="31">31</option>
                </select>
            </div>

            <button type="submit" class="btn btn-submit w-100">View Box Scores</button>
        </form>
        <div class="text-center mt-3">
            <a href="/searchPlayer" class="back-link">Search Player Stats &rarr;</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function goToBoxscore(e) {
            e.preventDefault();
            var year  = document.getElementById("year").value;
            var month = document.getElementById("month").value;
            var day   = document.getElementById("day").value;
            window.location.href = "/scores/" + year + "/" + month + "/" + day;
        }
    </script>
</body>

</html>
