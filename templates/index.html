<!DOCTYPE html>
<html>

<head>
    <title>NBA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background-color: #16213e;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        h1 {
            color: #c9aa71;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #8a8fa8;
            font-size: 0.95rem;
        }
        .form-label {
            color: #c9aa71;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-select {
            background-color: #0f3460;
            color: #e0e0e0;
            border: 1px solid #2a4a7f;
            border-radius: 8px;
        }
        .form-select:focus {
            background-color: #0f3460;
            color: #e0e0e0;
            border-color: #c9aa71;
            box-shadow: 0 0 0 0.2rem rgba(201, 170, 113, 0.25);
        }
        .btn-submit {
            background-color: #c9aa71;
            color: #1a1a2e;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 10px 0;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #e0c48a;
            color: #1a1a2e;
        }
        .nba-logo {
            font-size: 2.5rem;
        }
    </style>
</head>

<body>
    <div class="card p-5" style="width: 100%; max-width: 480px;">
        <div class="text-center mb-4">
            <div class="nba-logo mb-2">🏀</div>
            <h1>NBA API</h1>
            <p class="subtitle">Look up box scores by date</p>
        </div>

        <form onsubmit="goToBoxscore(event)">
            <div class="mb-3">
                <label for="year" class="form-label">Year</label>
                <select id="year" class="form-select"></select>
            </div>

            <div class="mb-3">
                <label for="month" class="form-label">Month</label>
                <select id="month" class="form-select">
                    <option value="01">January</option>
                    <option value="02">February</option>
                    <option value="03">March</option>
                    <option value="04">April</option>
                    <option value="05">May</option>
                    <option value="06">June</option>
                    <option value="07">July</option>
                    <option value="08">August</option>
                    <option value="09">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="day" class="form-label">Day</label>
                <select id="day" class="form-select"></select>
            </div>

            <button type="submit" class="btn btn-submit w-100">View Box Scores</button>
        </form>
        <div class="text-center mt-3">
            <a href="/searchPlayer" class="back-link">Search Player Stats &rarr;</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            const yearSelect = document.getElementById("year");
            for (let y = 2026; y >= 1970; y--) {
                const opt = document.createElement("option");
                opt.value = y;
                opt.textContent = y;
                yearSelect.appendChild(opt);
            }

            const daySelect = document.getElementById("day");
            for (let d = 1; d <= 31; d++) {
                const opt = document.createElement("option");
                opt.value = String(d).padStart(2, "0");
                opt.textContent = d;
                daySelect.appendChild(opt);
            }
        })();

        function goToBoxscore(e) {
            e.preventDefault();
            var year  = document.getElementById("year").value;
            var month = document.getElementById("month").value;
            var day   = document.getElementById("day").value;
            window.location.href = "/scores/" + year + "/" + month + "/" + day;
        }
    </script>
</body>

</html>
