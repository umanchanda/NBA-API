<!DOCTYPE html>
<html>

<head>
    <title>NBA Box Scores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 {
            color: #c9aa71;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #8a8fa8;
        }
        .back-link {
            color: #c9aa71;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: #e0c48a;
        }
        .game-card {
            background-color: #16213e;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .game-card .card-header {
            background-color: #0f3460;
            border-bottom: 1px solid #2a4a7f;
            color: #8a8fa8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .team-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1e2d50;
        }
        .team-row:last-child {
            border-bottom: none;
        }
        .team-name {
            color: #e0e0e0;
            font-size: 1.05rem;
            font-weight: 500;
        }
        .team-name.winner {
            color: #ffffff;
            font-weight: 700;
        }
        .team-score {
            color: #e0e0e0;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .team-score.winner {
            color: #c9aa71;
        }
        .winner-badge {
            color: #c9aa71;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 8px;
        }
        .quarter-table {
            width: 100%;
            font-size: 0.8rem;
            color: #8a8fa8;
            border-collapse: collapse;
            margin-top: 12px;
        }
        .quarter-table th {
            color: #5a6a8a;
            font-weight: 600;
            text-align: center;
            padding: 4px 8px;
            text-transform: uppercase;
            font-size: 0.7rem;
        }
        .quarter-table td {
            text-align: center;
            padding: 4px 8px;
            color: #a0aec0;
        }
        .quarter-table .team-label {
            text-align: left;
            color: #8a8fa8;
        }
        .card-links {
            border-top: 1px solid #1e2d50;
            padding-top: 12px;
            margin-top: 4px;
            display: flex;
            gap: 12px;
        }
        .card-links a {
            color: #c9aa71;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 600;
        }
        .card-links a:hover {
            color: #e0c48a;
            text-decoration: underline;
        }
        #loading {
            color: #8a8fa8;
            text-align: center;
            margin-top: 60px;
        }
        #error-msg {
            color: #e07070;
            text-align: center;
            margin-top: 60px;
        }
        .no-games {
            color: #8a8fa8;
            text-align: center;
            margin-top: 60px;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 860px;">
        <div class="d-flex align-items-center justify-content-between mb-2">
            <a href="/" class="back-link">&#8592; Back</a>
        </div>
        <div class="text-center mb-5">
            <div style="font-size:2rem;">🏀</div>
            <h1>NBA Box Scores</h1>
            <p class="subtitle" id="date-label"></p>
        </div>

        <div id="loading">Loading scores...</div>
        <div id="error-msg" style="display:none;"></div>
        <div id="games" class="row g-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const parts = window.location.pathname.split('/');
        const year = parts[2], month = parts[3], day = parts[4];

        const monthNames = ['','January','February','March','April','May','June',
                            'July','August','September','October','November','December'];
        document.getElementById('date-label').textContent =
            monthNames[parseInt(month)] + ' ' + parseInt(day) + ', ' + year;

        fetch('/boxscore/' + year + '/' + month + '/' + day)
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                const games = data.box_scores || [];
                if (games.length === 0) {
                    document.getElementById('games').innerHTML =
                        '<p class="no-games">No games found for this date.</p>';
                    return;
                }
                document.getElementById('games').innerHTML = games.map(renderCard).join('');
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                const el = document.getElementById('error-msg');
                el.style.display = 'block';
                el.textContent = 'Failed to load scores: ' + err.message;
            });

        function renderCard(game) {
            const overtime = (game.away_quarter_score || []).length > 4;
            const status = (game.status || '') + (overtime ? ' OT' : '');
            const awayIsWinner = game.winning_team !== game.home_team;
            const awayTeam  = awayIsWinner ? game.winning_team : game.losing_team;
            const homeTeam  = game.home_team;
            const awayScore = awayIsWinner ? game.winning_team_score : game.losing_team_score;
            const homeScore = awayIsWinner ? game.losing_team_score : game.winning_team_score;

            const quarterHeaders = (game.away_quarter_score || [])
                .map((_, i) => i < 4 ? 'Q' + (i+1) : 'OT' + (i-3))
                .map(h => '<th>' + h + '</th>')
                .join('');

            const awayQs = (game.away_quarter_score || []).map(s => '<td>' + s + '</td>').join('');
            const homeQs = (game.home_quarter_score || []).map(s => '<td>' + s + '</td>').join('');

            const quarterTable = quarterHeaders ? `
                <table class="quarter-table">
                    <thead><tr><th></th>${quarterHeaders}</tr></thead>
                    <tbody>
                        <tr><td class="team-label">${awayTeam}</td>${awayQs}</tr>
                        <tr><td class="team-label">${homeTeam}</td>${homeQs}</tr>
                    </tbody>
                </table>` : '';

            const links = [];
            if (game.player_breakdown) links.push('<a href="' + game.player_breakdown + '">Box Score &rarr;</a>');
            const linksHtml = links.length ? '<div class="card-links">' + links.join('') + '</div>' : '';

            return `
                <div class="col-12 col-md-6">
                    <div class="game-card card h-100">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span>Away vs Home</span>
                            <span>${status}</span>
                        </div>
                        <div class="card-body">
                            <div class="team-row">
                                <span class="team-name ${awayIsWinner ? 'winner' : ''}">
                                    ${awayTeam}
                                    ${awayIsWinner ? '<span class="winner-badge">W</span>' : ''}
                                </span>
                                <span class="team-score ${awayIsWinner ? 'winner' : ''}">${awayScore}</span>
                            </div>
                            <div class="team-row">
                                <span class="team-name ${!awayIsWinner ? 'winner' : ''}">
                                    ${homeTeam}
                                    ${!awayIsWinner ? '<span class="winner-badge">W</span>' : ''}
                                </span>
                                <span class="team-score ${!awayIsWinner ? 'winner' : ''}">${homeScore}</span>
                            </div>
                            ${quarterTable}
                            ${linksHtml}
                        </div>
                    </div>
                </div>`;
        }
    </script>
</body>

</html>
